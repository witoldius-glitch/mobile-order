<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Мобильный бланк заказа Motive</title>
  <link href="https://cdn.tailwindcss.com" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { 
      -webkit-tap-highlight-color: transparent; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    }
    .sticky-tabs { position: sticky; top: 0; z-index: 40; }
    .product-card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
    .product-card:active { transform: scale(0.98); }
    .badge-active { background-color: #1e3a8a; color: white; }
    .scrollbar-none::-webkit-scrollbar { display: none; }
    .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-gray-50 pb-32 select-none">

  <!-- ШАПКА ПРИЛОЖЕНИЯ -->
  <header class="bg-white border-b border-gray-100 px-4 py-3 flex items-center justify-between sticky top-0 z-50 shadow-sm">
    <div class="flex items-center space-x-3">
      <div class="w-10 h-10 rounded-xl bg-blue-900 text-white flex items-center justify-center text-xl shadow-md shadow-blue-200">
        <i class="fa-solid fa-toolbox"></i>
      </div>
      <div>
        <h1 class="font-bold text-gray-900 text-base leading-tight">Motive Каталог</h1>
        <p class="text-[11px] text-green-600 flex items-center font-medium mt-0.5">
          <span class="w-1.5 h-1.5 rounded-full bg-green-500 mr-1 animate-pulse"></span> Мобильный заказ в реальном времени
        </p>
      </div>
    </div>
    <button onclick="loadTableData()" class="w-9 h-9 rounded-lg bg-gray-50 text-gray-500 flex items-center justify-center active:bg-gray-100">
      <i class="fa-solid fa-arrow-rotate-right text-sm"></i>
    </button>
  </header>

  <!-- ПЕРЕКЛЮЧАТЕЛЬ УСЛОВИЙ ОПЛАТЫ (КРУПНЫЕ КНОПКИ 1 И 2) -->
  <div class="p-3 bg-gray-100 border-b border-gray-200 sticky-tabs shadow-sm">
    <div class="grid grid-cols-2 gap-2 bg-white p-1 rounded-xl border border-gray-200">
      <button id="btn-prepayment" onclick="setPaymentType('prepayment')" class="py-2.5 px-2 rounded-lg text-center transition-all duration-150 border border-transparent badge-active shadow-sm">
        <span class="block font-bold text-base leading-tight">1. Предоплата</span>
        <span class="block text-[10px] opacity-80 mt-0.5">Столбец H</span>
      </button>
      <button id="btn-deferment" onclick="setPaymentType('deferment')" class="py-2.5 px-2 rounded-lg text-center transition-all duration-150 border border-transparent text-gray-500 hover:bg-gray-50">
        <span class="block font-bold text-base leading-tight">2. Отсрочка</span>
        <span class="block text-[10px] opacity-80 mt-0.5">Столбец I</span>
      </button>
    </div>
  </div>

  <!-- ЭКРАН ЗАГРУЗКИ / ОШИБКИ -->
  <div id="status-screen" class="p-8 text-center space-y-4">
    <div id="status-spinner" class="inline-block animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-blue-900"></div>
    <p id="status-text" class="text-sm text-gray-500 font-medium">Загрузка актуального прайс-листа из Google Таблицы...</p>
  </div>

  <!-- ОСНОВНОЙ КОНТЕНТ (Скрыт во время загрузки) -->
  <div id="main-content" class="hidden">
    <!-- ПОИСК И ФИЛЬТРЫ -->
    <div class="p-4 space-y-3 bg-white border-b border-gray-100 shadow-sm">
      <div class="relative">
        <i class="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-gray-400 text-sm"></i>
        <input type="text" id="search-input" oninput="filterProducts()" placeholder="Поиск по артикулу или названию..." class="w-full pl-9 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-blue-900 focus:bg-white transition-all">
      </div>
      
      <!-- Лента категорий (Формируется автоматически из столбца F) -->
      <div class="flex space-x-1.5 overflow-x-auto pb-1 scrollbar-none" id="categories-bar">
        <!-- Сюда вставятся ваши новые категории из столбца F -->
      </div>
    </div>

    <!-- СПИСОК ТОВАРОВ -->
    <main class="p-4 space-y-3" id="products-container">
      <!-- Товары подгрузятся сюда -->
    </main>
  </div>

  <!-- СТАТУС-БАР КОРЗИНЫ -->
  <div id="cart-bar" class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 shadow-xl transform translate-y-full transition-transform duration-300 z-50 flex items-center justify-between rounded-t-2xl">
    <div onclick="toggleCartModal()" class="flex items-center space-x-3 cursor-pointer active:opacity-70">
      <div class="w-12 h-12 bg-blue-900 text-white rounded-xl flex items-center justify-center text-xl relative shadow-md">
        <i class="fa-solid fa-basket-shopping"></i>
        <span id="cart-count-badge" class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center border-2 border-white">0</span>
      </div>
      <div>
        <p class="text-xs text-gray-400 font-medium">Ваш заказ:</p>
        <p id="cart-total-price" class="text-base font-black text-gray-900">0.00 €</p>
      </div>
    </div>
    <button onclick="toggleCartModal()" class="bg-blue-900 hover:bg-blue-800 text-white font-bold text-sm px-5 py-3 rounded-xl transition duration-150 flex items-center space-x-2 shadow-md">
      <span>Просмотр</span>
      <i class="fa-solid fa-arrow-right text-xs"></i>
    </button>
  </div>

  <!-- МОДАЛЬНОЕ ОКНО КОРЗИНЫ -->
  <div id="cart-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden transition-opacity opacity-0 flex flex-col justify-end">
    <div class="bg-white rounded-t-3xl max-h-[85vh] flex flex-col transform translate-y-full transition-transform duration-300">
      <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between bg-gray-50 rounded-t-3xl">
        <div class="flex items-center space-x-2.5">
          <i class="fa-solid fa-cart-flatbed text-blue-900 text-lg"></i>
          <h2 class="text-base font-bold text-gray-900">Спецификация заказа</h2>
        </div>
        <button onclick="toggleCartModal()" class="w-8 h-8 rounded-full bg-gray-200 text-gray-500 flex items-center justify-center active:bg-gray-300">
          <i class="fa-solid fa-xmark text-sm"></i>
        </button>
      </div>

      <div class="overflow-y-auto p-4 space-y-3 flex-1 min-h-[200px]" id="cart-items-list"></div>

      <div class="p-5 border-t border-gray-100 space-y-4 bg-white">
        <div class="space-y-1.5 bg-gray-50 p-3 rounded-xl border border-gray-100">
          <div class="flex justify-between text-xs text-gray-500">
            <span>Всего позиций:</span>
            <span id="modal-total-count" class="font-semibold text-gray-800">0 шт.</span>
          </div>
          <div class="flex justify-between text-sm pt-1.5 border-t border-dashed border-gray-200 font-bold text-gray-900">
            <span>Итого без НДС, евро:</span>
            <span id="modal-total-sum" class="text-blue-900 text-base">0.00 €</span>
          </div>
        </div>

        <button onclick="submitOrder()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3.5 rounded-xl flex items-center justify-center space-x-2 text-base shadow-md">
          <i class="fa-brands fa-whatsapp text-lg"></i>
          <span>Отправить заказ в WhatsApp</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    // ⚠️ ID ВАШЕЙ НОВОЙ GOOGLE ТАБЛИЦЫ
    const SPREADSHEET_ID = "1u3LawyAhIDN-XB9hDZp1Q7erkvkRiSOwpNESHYo4nYU";
    
    // Структура индексов колонок (A=0, B=1, C=2, D=3, E=4, F=5, G=6, H=7, I=8, J=9, K=10, L=11, M=12)
    const COLS = {
      articul: 0,   // Столбец A (Артикул)
      image: 1,     // Столбец B (Фотография товара)
      title: 2,     // Столбец C (Наименование товара)
      category: 5,  // Столбец F (Назначение / Категория инструмента)
      prepayment: 7,// Столбец H (Цена Предоплата)
      deferment: 8, // Столбец I (Цена Отсрочка)
      boxQty: 12    // Столбец M (Количество в коробке) - ИЗМЕНЕНО с E (4) на M (12)
    };

    let products = [];
    let categories = [];
    let currentPaymentType = 'prepayment'; 
    let currentCategory = 'all';
    let cart = {}; 

    // ЗАГРУЗКА ДАННЫХ ИЗ GOOGLE SHEETS ЧЕРЕЗ CSV-ЭКСПОРТ (gid=1203362757)
    function loadTableData() {
      if (!SPREADSHEET_ID || SPREADSHEET_ID.includes("ID_ВАШЕЙ")) {
        showStatusError("Ошибка настройки", "Пожалуйста, укажите реальный SPREADSHEET_ID в коде файла.");
        return;
      }

      // Подключаемся к листу таблицы в режиме экспорта чистых данных
      const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=1203362757`;

      fetch(url)
        .then(response => {
          if (!response.ok) throw new Error("Не удалось получить доступ к таблице. Проверьте настройки доступа по ссылке.");
          return response.text();
        })
        .then(csvText => {
          parseCSVData(csvText);
        })
        .catch(err => {
          showStatusError("Сбой подключения", err.message);
        });
    }

    // РАЗБОР CSV СТРОК И АВТОМАТИЧЕСКАЯ ГЕНЕРАЦИЯ КАТЕГОРИЙ И ТОВАРОВ
    function parseCSVData(csvText) {
      const lines = csvText.split(/\r?\n/);
      let loadedProducts = [];
      let uniqueCategories = new Set();

      // Пропускаем шапку таблицы (начинаем со строки 2, индекс 1)
      for (let i = 1; i < lines.length; i++) {
        const row = parseCSVLine(lines[i]);
        if (!row || row.length < 9 || !row[COLS.title]) continue;

        const art = String(row[COLS.articul] || "").trim();
        const title = String(row[COLS.title]).trim();
        const cat = String(row[COLS.category] || "Разное").trim();
        
        // Чтение и очистка цен
        const pricePre = parseFloat(String(row[COLS.prepayment]).replace(/[^\d.,]/g, '').replace(',', '.'));
        const priceDef = parseFloat(String(row[COLS.deferment]).replace(/[^\d.,]/g, '').replace(',', '.'));
        
        // Считываем кратность из столбца M (индекс 12)
        const box = parseInt(String(row[COLS.boxQty]).replace(/[^\d]/g, '')) || 1;
        
        // 📝 ИЗМЕНЕНО: Обработка формул изображений (=IMAGE или =HYPERLINK)
        let imgUrl = String(row[COLS.image] || "").trim();
        const formulaMatch = imgUrl.match(/=["']?IMAGE\s*\(\s*["']([^"']+)["']/i) || imgUrl.match(/=["']?HYPERLINK\s*\(\s*["']([^"']+)["']/i);
        if (formulaMatch && formulaMatch[1]) {
          imgUrl = formulaMatch[1].trim();
        }
        imgUrl = imgUrl.replace(/^["']|["']$/g, ''); // чистим кавычки

        if (!imgUrl.startsWith("http")) {
          imgUrl = ""; // Теперь оставляем пустым, чтобы срабатывала красивая иконка-заглушка категории!
        }

        if (art && title) {
          loadedProducts.push({
            id: art,
            category: cat,
            title: title,
            image: imgUrl,
            pricePrepayment: isNaN(pricePre) ? 0 : pricePre,
            priceDeferment: isNaN(priceDef) ? 0 : priceDef,
            boxQty: box
          });
          uniqueCategories.add(cat);
        }
      }

      products = loadedProducts;
      categories = Array.from(uniqueCategories);

      // Скрываем загрузчик, показываем каталог
      document.getElementById('status-screen').classList.add('hidden');
      document.getElementById('main-content').classList.remove('hidden');

      renderCategoryBar();
      renderProducts();
    }

    // Функция безопасного разбора CSV-строки с учетом запятых внутри кавычек
    function parseCSVLine(text) {
      let p = '', r = [];
      let q = false;
      if (!text) return null;
      for (let i = 0; i < text.length; i++) {
        let c = text.charAt(i);
        if (c === '"') { q = !q; }
        else if (c === ',' && !q) { r.push(p); p = ''; }
        else { p += c; }
      }
      r.push(p);
      return r;
    }

    function showStatusError(title, desc) {
      document.getElementById('status-spinner').classList.add('hidden');
      document.getElementById('status-text').innerHTML = `<span class="text-red-600 font-bold block text-base">${title}</span><span class="text-xs text-gray-500 block mt-1 px-4">${desc}</span>`;
    }

    // РЕНДЕРИНГ ЛЕНТЫ КАТЕГОРИЙ (Динамические кнопки по столбцу F)
    function renderCategoryBar() {
      const bar = document.getElementById('categories-bar');
      bar.innerHTML = `<button id="cat-all" onclick="setCategory('all')" class="px-4 py-2 rounded-full text-xs font-semibold whitespace-nowrap bg-blue-900 text-white transition-all">Все товары</button>`;
      
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.innerText = cat;
        btn.onclick = () => setCategory(cat);
        btn.className = "px-4 py-2 rounded-full text-xs font-semibold whitespace-nowrap bg-gray-100 text-gray-600 transition-all";
        
        // Безопасная генерация ID без спецсимволов
        const safeId = "cat-" + cat.replace(/[^a-zA-Z0-9а-яА-Я]/g, '-');
        btn.id = safeId;
        bar.appendChild(btn);
      });
    }

    function setCategory(cat) {
      currentCategory = cat;
      
      const buttons = document.getElementById('categories-bar').getElementsByTagName('button');
      for (let btn of buttons) {
        btn.className = "px-4 py-2 rounded-full text-xs font-semibold whitespace-nowrap bg-gray-100 text-gray-600 transition-all";
      }
      
      if (cat === 'all') {
        document.getElementById('cat-all').className = "px-4 py-2 rounded-full text-xs font-semibold whitespace-nowrap bg-blue-900 text-white transition-all";
      } else {
        const safeId = "cat-" + cat.replace(/[^a-zA-Z0-9а-яА-Я]/g, '-');
        document.getElementById(safeId).className = "px-4 py-2 rounded-full text-xs font-semibold whitespace-nowrap bg-blue-900 text-white transition-all";
      }
      
      renderProducts();
    }

    // ОТРИСОВКА КАТАЛОГА ТОВАРОВ
    function renderProducts() {
      const container = document.getElementById('products-container');
      container.innerHTML = "";
      
      let hasVisibleProducts = false;
      const searchVal = document.getElementById('search-input').value.toLowerCase();

      products.forEach(p => {
        if (currentCategory !== 'all' && p.category !== currentCategory) return;
        if (searchVal && !p.title.toLowerCase().includes(searchVal) && !p.id.toLowerCase().includes(searchVal)) return;

        hasVisibleProducts = true;
        const price = currentPaymentType === 'prepayment' ? p.pricePrepayment : p.priceDeferment;
        const currentQty = cart[p.id] || 0;
        
        let actionButtonHTML = currentQty === 0 
          ? `<button onclick="addToCart('${p.id}')" class="bg-blue-50 text-blue-900 font-bold text-xs px-3 py-2 rounded-lg border border-blue-100 active:bg-blue-900 active:text-white transition-all"><i class="fa-solid fa-plus text-[10px] mr-0.5"></i> Добавить</button>`
          : `<div class="flex items-center space-x-1.5 bg-gray-100 p-0.5 rounded-lg border border-gray-200">
              <button onclick="changeQty('${p.id}', -1)" class="w-7 h-7 bg-white rounded-md flex items-center justify-center text-gray-700 shadow-sm active:bg-gray-200 font-bold">-</button>
              <span class="w-8 text-center text-sm font-black text-gray-900">${currentQty}</span>
              <button onclick="changeQty('${p.id}', 1)" class="w-7 h-7 bg-white rounded-md flex items-center justify-center text-gray-700 shadow-sm active:bg-gray-200 font-bold">+</button>
             </div>`;

        // Тематическая иконка-заглушка в зависимости от категории
        let iconClass = 'fa-solid fa-screwdriver-wrench';
        const catLower = p.category.toLowerCase();
        if (catLower.includes('лент')) {
          iconClass = 'fa-solid fa-tape';
        } else if (catLower.includes('укрыт') || catLower.includes('защит')) {
          iconClass = 'fa-solid fa-shield-halved';
        } else if (catLower.includes('перчат') || catLower.includes('одежд')) {
          iconClass = 'fa-solid fa-mitten';
        } else if (catLower.includes('инструмент')) {
          iconClass = 'fa-solid fa-hammer';
        }

        const card = document.createElement('div');
        card.className = "product-card bg-white p-3.5 rounded-2xl border border-gray-100 shadow-sm flex items-center justify-between space-x-3";
        card.innerHTML = `
          <div class="flex items-center space-x-3 flex-1 min-w-0">
            <!-- Отображаем картинку из столбца B, а если она пустая или ломается - красивую иконку категории -->
            <img src="${p.image}" class="w-14 h-14 object-cover rounded-xl bg-gray-50 border border-gray-100 flex-shrink-0" style="${p.image ? '' : 'display:none;'}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="w-14 h-14 bg-gray-100 rounded-xl flex-shrink-0 border border-gray-100 flex items-center justify-center text-blue-900 text-xl" style="${p.image ? 'display:none;' : ''}">
              <i class="${iconClass}"></i>
            </div>
            <div class="min-w-0 flex-1">
              <span class="text-[9px] font-bold text-gray-400 uppercase tracking-wider block">арт. ${p.id}</span>
              <h3 class="text-xs font-bold text-gray-800 block mt-0.5" style="white-space: normal; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">${p.title}</h3>
              <div class="flex items-center space-x-2 mt-1">
                <span class="text-sm font-black text-blue-900">${price.toFixed(2)} €</span>
                <span class="text-[10px] bg-gray-100 text-gray-500 font-medium px-1.5 py-0.5 rounded-md">Уп: ${p.boxQty} шт.</span>
              </div>
            </div>
          </div>
          <div class="flex-shrink-0">${actionButtonHTML}</div>
        `;
        container.appendChild(card);
      });

      if (!hasVisibleProducts) {
        container.innerHTML = `<div class="text-center py-12 text-gray-400 text-xs font-medium">Товары не найдены</div>`;
      }
    }

    function filterProducts() {
      renderProducts();
    }

    function setPaymentType(type) {
      currentPaymentType = type;
      document.getElementById('btn-prepayment').className = type === 'prepayment' ? "py-2.5 px-2 rounded-lg text-center transition-all duration-150 border border-transparent badge-active shadow-sm" : "py-2.5 px-2 rounded-lg text-center transition-all duration-150 border border-transparent text-gray-500 hover:bg-gray-50";
      document.getElementById('btn-deferment').className = type === 'deferment' ? "py-2.5 px-2 rounded-lg text-center transition-all duration-150 border border-transparent badge-active shadow-sm" : "py-2.5 px-2 rounded-lg text-center transition-all duration-150 border border-transparent text-gray-500 hover:bg-gray-50";
      renderProducts();
      updateCartBar();
    }

    // 📝 ИЗМЕНЕНО: Добавление в корзину сразу устанавливает количество, равное 1 коробке!
    function addToCart(id) { 
      const p = products.find(prod => prod.id === id);
      cart[id] = p.boxQty; 
      renderProducts(); 
      updateCartBar(); 
    }

    // 📝 ИЗМЕНЕНО: Изменение количества шагает строго по коробкам, минуя штуки!
    function changeQty(id, direction) { 
      if (!cart[id]) return; 
      const p = products.find(prod => prod.id === id);
      
      cart[id] += direction * p.boxQty; 
      
      if (cart[id] <= 0) {
        delete cart[id]; 
      }
      renderProducts(); 
      updateCartBar(); 
      if (!document.getElementById('cart-modal').classList.contains('hidden')) {
        renderCartModalItems(); 
      }
    }

    function updateCartBar() {
      const bar = document.getElementById('cart-bar');
      let uniqueItemsCount = Object.keys(cart).length;
      let totalSum = 0;
      
      for (let id in cart) {
        const p = products.find(prod => prod.id === id);
        totalSum += cart[id] * (currentPaymentType === 'prepayment' ? p.pricePrepayment : p.priceDeferment);
      }
      
      if (uniqueItemsCount > 0) {
        bar.classList.remove('translate-y-full');
        document.getElementById('cart-count-badge').innerText = uniqueItemsCount;
        document.getElementById('cart-total-price').innerText = totalSum.toFixed(2) + " €";
        document.getElementById('modal-total-count').innerText = uniqueItemsCount + " шт.";
        document.getElementById('modal-total-sum').innerText = totalSum.toFixed(2) + " €";
      } else {
        bar.classList.add('translate-y-full');
        toggleCartModalClose();
      }
    }

    function toggleCartModal() {
      const modal = document.getElementById('cart-modal');
      const inner = modal.querySelector('.rounded-t-3xl');
      if (modal.classList.contains('hidden')) {
        modal.classList.remove('hidden');
        renderCartModalItems();
        setTimeout(() => { modal.classList.remove('opacity-0'); modal.classList.add('opacity-100'); inner.classList.remove('translate-y-full'); }, 10);
      } else { toggleCartModalClose(); }
    }

    function toggleCartModalClose() {
      const modal = document.getElementById('cart-modal');
      const inner = modal.querySelector('.rounded-t-3xl');
      if (!modal.classList.contains('hidden')) {
        modal.classList.remove('opacity-100'); modal.classList.add('opacity-0'); inner.classList.add('translate-y-full');
        setTimeout(() => modal.classList.add('hidden'), 300);
      }
    }

    // ОТРИСОВКА ПОЗИЦИЙ В КОРЗИНЕ (Количество пишется и в штуках, и в коробках)
    function renderCartModalItems() {
      const list = document.getElementById('cart-items-list');
      list.innerHTML = "";
      
      for (let id in cart) {
        const p = products.find(prod => prod.id === id);
        const price = currentPaymentType === 'prepayment' ? p.pricePrepayment : p.priceDeferment;
        const qty = cart[id];
        const boxes = Math.round(qty / p.boxQty); // Коробки всегда круглые

        const row = document.createElement('div');
        row.className = "bg-gray-50 p-3 rounded-xl border border-gray-100 space-y-2";
        row.innerHTML = `
          <div class="flex justify-between items-start space-x-2">
            <div class="min-w-0 flex-1">
              <span class="text-[9px] font-bold text-gray-400">арт. ${p.id}</span>
              <h4 class="text-xs font-bold text-gray-800 truncate">${p.title}</h4>
              <div class="text-[11px] font-black text-blue-900 mt-0.5">${price.toFixed(2)} € × ${qty} шт. = ${(qty * price).toFixed(2)} €</div>
              <span class="text-[10px] text-green-600 font-semibold bg-green-50 px-1.5 py-0.5 rounded-md mt-1 inline-block"><i class="fa-solid fa-circle-check"></i> Кратность коробке соблюдена (${boxes} кор.)</span>
            </div>
            <div class="flex items-center space-x-1.5 bg-white p-0.5 rounded-lg border border-gray-200 flex-shrink-0 shadow-sm">
              <button onclick="changeQty('${p.id}', -1)" class="w-6 h-6 rounded-md bg-gray-50 flex items-center justify-center font-bold text-gray-600 text-xs">-</button>
              <span class="w-6 text-center text-xs font-black text-gray-900">${qty}</span>
              <button onclick="changeQty('${p.id}', 1)" class="w-6 h-6 rounded-md bg-gray-50 flex items-center justify-center font-bold text-gray-600 text-xs">+</button>
            </div>
          </div>
        `;
        list.appendChild(row);
      }
    }

    // ОТПРАВКА СЛОВЕСНОЙ СПЕЦИФИКАЦИИ В WHATSAPP
    function submitOrder() {
      let text = "📦 *НОВЫЙ МОБИЛЬНЫЙ ЗАКАЗ: Motive*\n";
      text += "💳 *Расчет цены:* " + (currentPaymentType === 'prepayment' ? "1. Предоплата (Столбец H)" : "2. Отсрочка (Столбец I)") + "\n";
      text += "📅 *Дата отправки:* " + new Date().toLocaleDateString('ru-RU') + "\n";
      text += "---------------------------------------\n\n";
      
      let totalSum = 0, count = 1;
      for (let id in cart) {
        const p = products.find(prod => prod.id === id);
        const price = currentPaymentType === 'prepayment' ? p.pricePrepayment : p.priceDeferment;
        const qty = cart[id];
        const sum = qty * price;
        totalSum += sum;
        
        text += count + ") " + p.title + "\n";
        text += "   *Арт:* " + id + " | *Кол-во:* " + qty + " шт. (" + (qty/p.boxQty).toFixed(1) + " (кор.)\n";
        text += "   *Цена без НДС:* " + price.toFixed(2) + " € | *Сумма:* " + sum.toFixed(2) + " €\n\n";
        count++;
      }
      
      text += "---------------------------------------\n";
      text += "💰 *ИТОГО БЕЗ НДС:* " + totalSum.toFixed(2) + " €\n\n";
      text += "_Сгенерировано автоматически через мобильный бланк Motive_";

      window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(text), '_blank');
    }

    // Автоматический запуск подгрузки данных при старте
    loadTableData();
  </script>
</body>
